<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Política de Cookies | IA de Barrio</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="landing_apple_unified.css?v=8">
    <style>
        .legal-page { padding: 140px 0 80px; min-height: 100vh; }
        .legal-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-card);
            padding: 60px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            max-width: 900px;
            margin: 0 auto;
        }
        .legal-header { margin-bottom: 40px; }
        .legal-header h1 { font-size: 3.5rem; letter-spacing: -0.03em; margin-bottom: 10px; }
        .legal-header p { color: var(--text-grey); font-size: 1.1rem; }
        
        .legal-body { line-height: 1.8; color: var(--text-main); font-size: 1.05rem; }
        .legal-body h2 { font-size: 1.6rem; margin: 40px 0 20px; letter-spacing: -0.01em; }
        .legal-body p { margin-bottom: 20px; opacity: 0.9; }

        .btn-back {
            display: inline-flex;
            align-items: center; gap: 10px;
            color: var(--accent-blue); text-decoration: none;
            font-weight: 500; margin-bottom: 30px;
            transition: transform 0.3s ease;
        }
        .btn-back:hover { transform: translateX(-5px); }

        @media (max-width: 768px) {
            .legal-card { padding: 30px; border-radius: 0; border: none; background: transparent; }
            .legal-header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body data-theme="light">
    <nav class="apple-nav">
        <div class="container nav-content">
            <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">IA<span>deBarrio</span></a>
            
            <button id="mobile-menu-btn" class="mobile-menu-toggle" aria-label="Abrir menú">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-open"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-close"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>

            <div class="nav-links" id="apple-nav-links">
                <a href="servicios.html" class="nav-link">Servicios</a>
                <a href="index.html#precios" class="nav-link">Precios</a>
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Cambiar tema"></button>
            </div>
        </div>
    </nav>

    <main class="legal-page">
        <div class="container">
            <a href="index.html" class="btn-back">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Volver al inicio
            </a>
            
            <article class="legal-card reveal visible">
                <header class="legal-header">
                    <h1>Cookies</h1>
                    <p>Transparencia total sobre tus datos.</p>
                </header>
                
                <div id="cookies-content" class="legal-body">
                    <p>Cargando información legal de forma segura...</p>
                </div>
            </article>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script>
        // Lógica de Temas
        const themeToggleBtn = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.body.setAttribute('data-theme', currentTheme);
        updateToggleIcon(currentTheme);

        themeToggleBtn.addEventListener('click', () => {
            const newTheme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateToggleIcon(newTheme);
        });

        function updateToggleIcon(theme) {
            if (theme === 'dark') {
                themeToggleBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"></line></svg>`;
            } else {
                themeToggleBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
            }
        }

        // Lógica Menú Móvil
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const navLinks = document.getElementById('apple-nav-links');

        if (mobileMenuBtn && navLinks) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenuBtn.classList.toggle('active');
                navLinks.classList.toggle('active');
                document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : '';
            });
        }

        // Carga de contenido Supabase
        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof _supabase !== 'undefined') {
                const { data } = await _supabase.from('site_settings').select('value').eq('key', 'cookie_policy').single();
                if (data && data.value) {
                    document.getElementById('cookies-content').innerHTML = data.value;
                } else {
                    document.getElementById('cookies-content').innerHTML = "<h2>Política de Cookies</h2><p>Utilizamos cookies esenciales para el funcionamiento de la web y analíticas para mejorar tu experiencia. Al navegar por IA de Barrio, las aceptas.</p>";
                }
            }
        });
    </script>
</body>
</html>
