<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | IA de Barrio Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #000000;
            --text-white: #f5f5f7;
            --accent-blue: #0071e3;
        }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-black);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
            animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .logo { font-weight: 600; font-size: 1.5rem; margin-bottom: 40px; }
        .logo span { color: #86868b; font-weight: 300; }
        h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 30px; letter-spacing: -0.02em; }
        .form-group { margin-bottom: 15px; text-align: left; }
        input {
            width: 100%;
            padding: 18px;
            background: #1d1d1f;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin-top: 8px;
            box-sizing: border-box;
        }
        input:focus { outline: none; border-color: var(--accent-blue); }
        button {
            width: 100%;
            padding: 18px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: scale(1.01); }
        .error-msg { color: #ff3b30; font-size: 0.9rem; margin-top: 15px; display: none; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">IA<span>deBarrio</span></div>
        <h1>Acceso Admin</h1>
        <form id="login-form">
            <div class="form-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Contraseña" required>
            </div>
            <button type="submit" id="login-btn">Entrar</button>
            <div id="error-msg" class="error-msg">Credenciales incorrectas</div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');

            btn.innerText = 'Autenticando...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            const { data, error } = await _supabase.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                console.error('Error login:', error.message);
                errorMsg.innerText = 'Acceso denegado. Revisa tus datos.';
                errorMsg.style.display = 'block';
                btn.innerText = 'Entrar';
                btn.disabled = false;
            } else {
                window.location.href = 'admin.html';
            }
        });
    </script>
</body>
</html>
